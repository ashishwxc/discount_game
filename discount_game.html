<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scratch & Win Reward</title>

<style>

/* RESET */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BACKGROUND */

html,
body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 20px;

  background-image: url('https://github.com/ashishwxc/discount_game/blob/main/WhatsApp%20Image%202026-01-24%20at%2010.29.22%20PM.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  position: relative;
}

/* DARK OVERLAY FOR TRANSPARENCY */

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: rgba(0,0,0,0.35);

  backdrop-filter: blur(2px);

  z-index: 0;
}

/* MAIN CARD */

.overlay {
  width: 100%;
  max-width: 560px;

  background: rgba(255,255,255,0.93);

  padding: 40px 30px;

  border-radius: 24px;

  text-align: center;

  box-shadow: 0 12px 40px rgba(0,0,0,0.25);

  position: relative;
  z-index: 2;
}

/* DATE TIME */

#datetime {
  font-size: 18px;
  margin-bottom: 28px;
  color: #444;
  font-weight: bold;
  line-height: 1.5;
}

/* TITLE */

h2 {
  font-size: 30px;
  margin-bottom: 30px;
  color: #111;
  line-height: 1.3;
}

/* SCRATCH CARD */

.scratch-container {
  position: relative;

  width: 320px;
  height: 180px;

  margin: 0 auto 30px;

  border-radius: 18px;

  overflow: hidden;

  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}

/* REWARD CARD */

.reward-card {
  width: 100%;
  height: 100%;

  background:
    linear-gradient(135deg, #fff7cc, #ffe082);

  display: flex;
  flex-direction: column;

  justify-content: center;
  align-items: center;

  text-align: center;

  padding: 20px;

  color: #222;
}

.reward-card h3 {
  font-size: 23px;
  line-height: 1.3;
  font-weight: bold;
}

.reward-card p {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* SCRATCH LAYER */

canvas {
  position: absolute;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  cursor: pointer;
}

/* MESSAGE */

#message {
  font-size: 26px;
  font-weight: bold;

  color: #0b8f32;

  opacity: 0;

  margin-top: 20px;
}

.show {
  animation: pop 0.7s ease forwards;
}

/* ANIMATION */

@keyframes pop {

  0% {
    transform: scale(0.5);
    opacity: 0;
  }

  70% {
    transform: scale(1.1);
    opacity: 1;
  }

  100% {
    transform: scale(1);
    opacity: 1;
  }
}

/* CONFETTI */

.confetti {
  position: fixed;

  width: 10px;
  height: 10px;

  top: -10px;

  animation: fall linear forwards;

  z-index: 999;
}

@keyframes fall {

  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* NOTE */

.note {
  font-size: 16px;
  margin-top: 24px;
  line-height: 1.7;
  color: #222;
}

/* MOBILE */

@media (max-width: 600px) {

  .overlay {
    padding: 28px 20px;
  }

  #datetime {
    font-size: 15px;
  }

  h2 {
    font-size: 24px;
  }

  .scratch-container {
    width: 260px;
    height: 150px;
  }

  .reward-card h3 {
    font-size: 20px;
  }

  .reward-card p {
    font-size: 15px;
  }

  #message {
    font-size: 22px;
  }

  .note {
    font-size: 14px;
  }
}

</style>
</head>

<body>

<div class="overlay">

  <div id="datetime"></div>

  <h2>🎉 Scratch & Win Reward 🎉</h2>

  <div class="scratch-container" id="scratchContainer">

    <div class="reward-card">

      <h3 id="rewardText">Scratch Me</h3>

      <p id="rewardCode"></p>

    </div>

    <canvas id="scratchCanvas"></canvas>

  </div>

  <div id="message"></div>

  <p class="note">
    Valid for same-day order only<br>
    Share the screenshot with the restaurant to claim.
  </p>

</div>

<script>

// DATE TIME

function updateDateTime() {

  const now = new Date();

  const date = now.toLocaleDateString(undefined, {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  const time = now.toLocaleTimeString();

  document.getElementById("datetime").innerHTML =
    "📅 " + date + " | ⏰ " + time;
}

setInterval(updateDateTime, 1000);

updateDateTime();


// STORAGE

const STORAGE_KEY = "rewardPlayedDate";

const todayKey =
  new Date().toISOString().split("T")[0];


// REWARDS

const NORMAL = [

  {text:"10% OFF",code:"UA-7B3M9Q"},
  {text:"11% OFF",code:"UA-K8F2A6"},
  {text:"12% OFF",code:"UA-9Q4L2X"},
  {text:"13% OFF",code:"UA-M5A7C8"},
  {text:"14% OFF",code:"UA-2XQ9F4"},
  {text:"16% OFF",code:"UA-F4Q7A9"},
  {text:"17% OFF",code:"UA-6C2X8L"},
  {text:"18% OFF",code:"UA-Q9M5F2"},
  {text:"Buy Any Burger and Get Fries Free",code:"UA-BG7K2"},
  {text:"Buy 2 Beverages, Get 1 Free",code:"UA-B21QX"},
  {text:"Small Fries Free",code:"UA-FR88Q"},
  {text:"Free Ice Tea",code:"UA-T9F3KQ"},
  {text:"Free Iced Americano",code:"UA-A7M2QX"}

];

const RARE = [

  {text:"20% OFF",code:"UA-F4Q9A2"}

];

const ULTRA = [

  {text:"Buy 2 Get 1 On Any Pasta",code:"UA-PB7X2L"}

];


// GET RANDOM REWARD

function getReward() {

  const chance = Math.random();

  if(chance < 0.75) {

    return NORMAL[
      Math.floor(Math.random() * NORMAL.length)
    ];
  }

  else if(chance < 0.95) {

    return RARE[
      Math.floor(Math.random() * RARE.length)
    ];
  }

  else {

    return ULTRA[
      Math.floor(Math.random() * ULTRA.length)
    ];
  }
}


// ELEMENTS

const rewardText =
  document.getElementById("rewardText");

const rewardCode =
  document.getElementById("rewardCode");

const message =
  document.getElementById("message");


// DAILY LIMIT

if(localStorage.getItem(STORAGE_KEY) === todayKey) {

  rewardText.innerHTML = "❌ Already Played";

  rewardCode.innerHTML =
    "Come back tomorrow";

} else {

  const reward = getReward();

  rewardText.innerHTML =
    reward.text;

  rewardCode.innerHTML =
    "Code: " + reward.code;

  localStorage.setItem(
    STORAGE_KEY,
    todayKey
  );

  setupScratchCard();
}


// SCRATCH CARD

function setupScratchCard() {

  const canvas =
    document.getElementById("scratchCanvas");

  const container =
    document.getElementById("scratchContainer");

  canvas.width =
    container.offsetWidth;

  canvas.height =
    container.offsetHeight;

  const ctx =
    canvas.getContext("2d");

  // SCRATCH LAYER

  ctx.fillStyle = "#bdbdbd";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  // TEXT

  ctx.fillStyle = "#ffffff";

  ctx.font = "bold 23px Arial";

  ctx.textAlign = "center";

  ctx.fillText(
    "SCRATCH HERE",
    canvas.width / 2,
    canvas.height / 2 + 8
  );

  let scratching = false;

  let revealed = false;


  function scratch(x, y) {

    ctx.globalCompositeOperation =
      "destination-out";

    ctx.beginPath();

    ctx.arc(
      x,
      y,
      30,
      0,
      Math.PI * 2
    );

    ctx.fill();

    checkReveal();
  }


  function getXY(e) {

    const rect =
      canvas.getBoundingClientRect();

    if(e.touches) {

      return {

        x:
          e.touches[0].clientX - rect.left,

        y:
          e.touches[0].clientY - rect.top
      };
    }

    return {

      x:
        e.clientX - rect.left,

      y:
        e.clientY - rect.top
    };
  }


  // DESKTOP

  canvas.addEventListener(
    "mousedown",
    () => scratching = true
  );

  canvas.addEventListener(
    "mouseup",
    () => scratching = false
  );

  canvas.addEventListener(
    "mousemove",
    e => {

      if(!scratching) return;

      const pos = getXY(e);

      scratch(pos.x, pos.y);
    }
  );


  // MOBILE

  canvas.addEventListener(
    "touchstart",
    () => scratching = true
  );

  canvas.addEventListener(
    "touchend",
    () => scratching = false
  );

  canvas.addEventListener(
    "touchmove",
    e => {

      e.preventDefault();

      if(!scratching) return;

      const pos = getXY(e);

      scratch(pos.x, pos.y);

    },
    { passive:false }
  );


  // REVEAL CHECK

  function checkReveal() {

    if(revealed) return;

    const pixels =
      ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
      ).data;

    let transparent = 0;

    for(let i = 3; i < pixels.length; i += 4) {

      if(pixels[i] < 128) {
        transparent++;
      }
    }

    const percent =
      transparent /
      (canvas.width * canvas.height);

    if(percent > 0.4) {

      revealed = true;

      canvas.style.transition =
        "opacity 0.6s";

      canvas.style.opacity = 0;

      setTimeout(() => {

        canvas.remove();

      }, 700);

      showWin();
    }
  }
}


// WIN EFFECT

let confettiInterval = null;

function showWin() {

  message.innerHTML =
    "🎉 Discount Revealed!";

  message.classList.add("show");

  message.style.opacity = 1;

  startConfetti();

  setTimeout(() => {

    clearInterval(confettiInterval);

    confettiInterval = null;

  }, 8000);
}


// CONFETTI

function startConfetti() {

  if(confettiInterval) return;

  confettiInterval = setInterval(() => {

    for(let i = 0; i < 8; i++) {

      const confetti =
        document.createElement("div");

      confetti.className = "confetti";

      confetti.style.left =
        Math.random() * 100 + "vw";

      confetti.style.backgroundColor =
        `hsl(${Math.random()*360},100%,50%)`;

      confetti.style.animationDuration =
        Math.random() * 2 + 2 + "s";

      document.body.appendChild(confetti);

      setTimeout(() => {

        confetti.remove();

      }, 4000);
    }

  }, 700);
}

</script>

</body>
</html>
