<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch & Win Reward</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
min-height:100%;
overflow-x:hidden;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background-image:url('https://images.unsplash.com/photo-1516100882582-96c3a05fe590?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(2px);
z-index:0;
}

.overlay{
width:100%;
max-width:560px;
background:rgba(255,255,255,0.95);
padding:40px 30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.18);
position:relative;
z-index:2;
}

#datetime{
font-size:18px;
margin-bottom:28px;
color:#555;
font-weight:bold;
line-height:1.5;
}

h2{
font-size:28px;
margin-bottom:28px;
color:#000;
}

.scratch-container{
position:relative;
width:320px;
height:180px;
margin:0 auto 30px;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.reward-card{
width:100%;
height:100%;
background:linear-gradient(135deg,#fff7cc,#ffe082);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
color:#222;
text-align:center;
}

.reward-card h3{
font-size:23px;
line-height:1.3;
font-weight:bold;
}

.reward-card p{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
cursor:pointer;
}

#message{
font-size:28px;
font-weight:bold;
color:green;
opacity:0;
margin-top:20px;
}

.show{
animation:pop 0.7s ease forwards;
}

@keyframes pop{
0%{
transform:scale(0.5);
opacity:0;
}
70%{
transform:scale(1.1);
opacity:1;
}
100%{
transform:scale(1);
opacity:1;
}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.note{
font-size:16px;
margin-top:25px;
line-height:1.6;
color:#222;
font-weight:bold;
}

@media (max-width:600px){

.overlay{
padding:30px 20px;
}

#datetime{
font-size:15px;
}

h2{
font-size:24px;
line-height:1.3;
}

.scratch-container{
width:260px;
height:150px;
}

.reward-card h3{
font-size:20px;
}

.reward-card p{
font-size:16px;
}

#message{
font-size:22px;
}

.note{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="overlay">

<div id="datetime"></div>

<h2>🎉 Scratch & Win Reward 🎉</h2>
<div class="scratch-container" id="scratchContainer">
<div class="reward-card">
<h3 id="rewardText">Scratch Me</h3>
<p id="rewardCode"></p>
</div>
<canvas id="scratchCanvas"></canvas>
</div>
  
<div id="message"></div>

<p class="note">
Valid for same-day order only<br>
Share the screenshot with the restaurant to claim.<br><br>
⚠️ Discount will not apply without showing the scratch card screenshot at the restaurant.
</p>
</div>

<script>

function updateDateTime(){

const now=new Date();

const date=now.toLocaleDateString(undefined,{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
});

const time=now.toLocaleTimeString();

document.getElementById("datetime").innerText=
"📅 "+date+" | ⏰ "+time;
}

setInterval(updateDateTime,1000);

updateDateTime();

const STORAGE_KEY="rewardPlayedDate";

const todayKey=
new Date().toISOString().split("T")[0];

const NORMAL=[

{text:"10% OFF",code:"UA-10OFF"},
{text:"15% OFF",code:"UA-15OFF"},
{text:"20% OFF",code:"UA-20OFF"},
];

const RARE=[
{text:"25% OFF",code:"UA-25OFF"},
{text:"30% OFF",code:"UA-30OFF"}
];

const ULTRA=[
{text:"35% OFF",code:"UA-35OFF"},
];

function getReward(){
const chance=Math.random();
if(chance<0.75){
return NORMAL[
Math.floor(Math.random()*NORMAL.length)
];
}

else if(chance<0.95){
return RARE[
Math.floor(Math.random()*RARE.length)
];
}

else{
return ULTRA[
Math.floor(Math.random()*ULTRA.length)
];
}
}

const rewardText=
document.getElementById("rewardText");

const rewardCode=
document.getElementById("rewardCode");

const message=
document.getElementById("message");

if(localStorage.getItem(STORAGE_KEY)===todayKey){

rewardText.innerHTML=
"❌ Already Scratched Today";

rewardCode.innerHTML=
"Come back tomorrow";

document.getElementById("scratchCanvas").style.display="none";

}else{

const reward=getReward();

rewardText.innerHTML=
reward.text;

rewardCode.innerHTML=
"Code: "+reward.code;

setupScratchCard();
}

function setupScratchCard(){

const canvas=
document.getElementById("scratchCanvas");

const container=
document.getElementById("scratchContainer");

canvas.width=
container.offsetWidth;

canvas.height=
container.offsetHeight;

const ctx=
canvas.getContext("2d");

ctx.fillStyle="#bdbdbd";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#ffffff";

ctx.font="bold 23px Arial";

ctx.textAlign="center";

ctx.fillText(
"SCRATCH HERE",
canvas.width/2,
canvas.height/2+8
);

let scratching=false;

let revealed=false;

function scratch(x,y){

ctx.globalCompositeOperation=
"destination-out";

ctx.beginPath();

ctx.arc(
x,
y,
30,
0,
Math.PI*2
);

ctx.fill();

checkReveal();
}

function getXY(e){

const rect=
canvas.getBoundingClientRect();

if(e.touches){

return{

x:
e.touches[0].clientX-rect.left,

y:
e.touches[0].clientY-rect.top
};
}

return{

x:
e.clientX-rect.left,

y:
e.clientY-rect.top
};
}

canvas.addEventListener(
"mousedown",
()=>scratching=true
);

canvas.addEventListener(
"mouseup",
()=>scratching=false
);

canvas.addEventListener(
"mousemove",
e=>{

if(!scratching)return;

const pos=getXY(e);

scratch(pos.x,pos.y);
}
);

canvas.addEventListener(
"touchstart",
()=>scratching=true
);

canvas.addEventListener(
"touchend",
()=>scratching=false
);

canvas.addEventListener(
"touchmove",
e=>{

e.preventDefault();

if(!scratching)return;

const pos=getXY(e);

scratch(pos.x,pos.y);

},
{passive:false}
);

function checkReveal(){

if(revealed)return;

const pixels=
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
).data;

let transparent=0;

for(let i=3;i<pixels.length;i+=4){

if(pixels[i]<128){
transparent++;
}
}

const percent=
transparent/
(canvas.width*canvas.height);

if(percent>0.4){

revealed=true;

canvas.style.transition=
"opacity 0.6s";

canvas.style.opacity=0;

setTimeout(()=>{

canvas.remove();

},700);

showWin();
}
}
}

let confettiInterval=null;

function showWin(){

localStorage.setItem(
STORAGE_KEY,
todayKey
);

message.innerText=
"🎉 Discount Revealed!";

message.classList.add("show");

message.style.opacity=1;

startConfetti();

setTimeout(()=>{

clearInterval(confettiInterval);

confettiInterval=null;

},8000);
}

function startConfetti(){

if(confettiInterval)return;

confettiInterval=setInterval(()=>{

for(let i=0;i<8;i++){

const confetti=
document.createElement("div");

confetti.className="confetti";

confetti.style.left=
Math.random()*100+"vw";

confetti.style.backgroundColor=
`hsl(${Math.random()*360},100%,50%)`;

confetti.style.animationDuration=
Math.random()*2+2+"s";

document.body.appendChild(confetti);

setTimeout(()=>{

confetti.remove();

},4000);
}

},700);
}

</script>

</body>
</html>
