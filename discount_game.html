<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scratch & Win Reward</title>

<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  overflow: hidden;
}

.overlay {
  background: rgba(255,255,255,0.95);
  padding: 47px 43px;
  border-radius: 16px;
  max-width: 90%;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

#datetime {
  font-size: 29px;
  margin-bottom: 25px;
  color: #555;
  font-weight: bold;
}

h2 {
  margin-bottom: 35px;
  font-size: 47px;
}

.scratch-container {
  position: relative;
  width: 335px;
  height: 195px;
  margin: 35px auto;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

.reward-card {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fff7cc, #ffe082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: #222;
  padding: 35px;
  box-sizing: border-box;
}

.reward-card h3 {
  margin: 0;
  font-size: 43px;
  line-height: 1.2;
}

.reward-card p {
  margin-top: 25px;
  font-size: 33px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  cursor: grab;
}

#message {
  margin-top: 33px;
  font-size: 35px;
  font-weight: bold;
  color: green;
  opacity: 0;
}

.show {
  animation: pop 0.7s ease forwards;
}

@keyframes pop {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }

  70% {
    transform: scale(1.1);
    opacity: 1;
  }

  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

<body>

<div class="overlay">

  <div id="datetime"></div>

  <h2>🎉 Scratch & Win Reward 🎉</h2>

  <div class="scratch-container" id="scratchContainer">

    <div class="reward-card">
      <h3 id="rewardText">Scratch Me</h3>
      <p id="rewardCode"></p>
    </div>

    <canvas id="scratchCanvas"></canvas>

  </div>

  <div id="message"></div>

  <p class="note">
    Valid for same-day order only<br>
    Share the screenshot with the restaurant to claim.
  </p>

</div>

<script>

// 🔹 LIVE DATE & TIME

function updateDateTime() {

  const now = new Date();

  const date = now.toLocaleDateString(undefined, {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });

  const time = now.toLocaleTimeString();

  document.getElementById("datetime").innerText =
    "📅 " + date + " | ⏰ " + time;
}

setInterval(updateDateTime, 1000);
updateDateTime();


// 🔹 REWARD SYSTEM

const STORAGE_KEY = "rewardPlayedDate";
const todayKey = new Date().toISOString().split("T")[0];

const NORMAL = [
  {text:"10% OFF",code:"UA-7B3M9Q"},
  {text:"11% OFF",code:"UA-K8F2A6"},
  {text:"12% OFF",code:"UA-9Q4L2X"},
  {text:"13% OFF",code:"UA-M5A7C8"},
  {text:"14% OFF",code:"UA-2XQ9F4"},
  {text:"16% OFF",code:"UA-F4Q7A9"},
  {text:"17% OFF",code:"UA-6C2X8L"},
  {text:"18% OFF",code:"UA-Q9M5F2"},
  {text:"Buy Any Burger and Get Fries Free",code:"UA-BG7K2"},
  {text:"Buy 2 Beverages, Get 1 Free",code:"UA-B21QX"},
  {text:"Small Fries Free",code:"UA-FR88Q"},
  {text:"Free Ice Tea",code:"UA-T9F3KQ"},
  {text:"Free Iced Americano",code:"UA-A7M2QX"}
];

const RARE = [
  {text:"20% OFF",code:"UA-F4Q9A2"}
];

const ULTRA = [
  {text:"Buy 2 Get 1 On Any Pasta",code:"UA-PB7X2L"}
];

function getReward() {

  const chance = Math.random();

  if(chance < 0.75) {
    return NORMAL[Math.floor(Math.random() * NORMAL.length)];
  }

  else if(chance < 0.95) {
    return RARE[Math.floor(Math.random() * RARE.length)];
  }

  else {
    return ULTRA[Math.floor(Math.random() * ULTRA.length)];
  }
}

const rewardText = document.getElementById("rewardText");
const rewardCode = document.getElementById("rewardCode");
const message = document.getElementById("message");

if(localStorage.getItem(STORAGE_KEY) === todayKey) {

  rewardText.innerHTML = "❌ Already Played";
  rewardCode.innerHTML = "Come back tomorrow";

} else {

  const reward = getReward();

  rewardText.innerHTML = reward.text;
  rewardCode.innerHTML = "Code: " + reward.code;

  localStorage.setItem(STORAGE_KEY, todayKey);

  setupScratchCard();
}


// 🔹 SCRATCH CARD

function setupScratchCard() {

  const canvas = document.getElementById("scratchCanvas");
  const container = document.getElementById("scratchContainer");

  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;

  const ctx = canvas.getContext("2d");

  // Gray layer
  ctx.fillStyle = "#bdbdbd";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Top text
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 43px Arial";
  ctx.textAlign = "center";
  ctx.fillText("SCRATCH", canvas.width / 2, canvas.height / 2 - 10);
  ctx.fillText("HERE", canvas.width / 2, canvas.height / 2 + 40);

  let scratching = false;
  let revealed = false;

  function scratch(x, y) {

    ctx.globalCompositeOperation = "destination-out";

    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.fill();

    checkReveal();
  }

  function getXY(e) {

    const rect = canvas.getBoundingClientRect();

    if(e.touches) {

      return {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top
      };
    }

    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  // Desktop

  canvas.addEventListener("mousedown", () => scratching = true);

  canvas.addEventListener("mouseup", () => scratching = false);

  canvas.addEventListener("mousemove", e => {

    if(!scratching) return;

    const pos = getXY(e);

    scratch(pos.x, pos.y);
  });

  // Mobile

  canvas.addEventListener("touchstart", () => scratching = true);

  canvas.addEventListener("touchend", () => scratching = false);

  canvas.addEventListener("touchmove", e => {

    e.preventDefault();

    if(!scratching) return;

    const pos = getXY(e);

    scratch(pos.x, pos.y);

  }, { passive:false });


  function checkReveal() {

    if(revealed) return;

    const pixels =
      ctx.getImageData(0,0,canvas.width,canvas.height).data;

    let transparent = 0;

    for(let i = 3; i < pixels.length; i += 4) {

      if(pixels[i] < 128) {
        transparent++;
      }
    }

    const percent =
      transparent / (canvas.width * canvas.height);

    if(percent > 0.4) {

      revealed = true;

      canvas.style.transition = "opacity 0.6s";
      canvas.style.opacity = 0;

      setTimeout(() => {
        canvas.remove();
      }, 700);

      showWin();
    }
  }
}


// 🔹 WIN EFFECT

let confettiInterval = null;

function showWin() {

  message.innerText = "🎉 Discount Revealed!";
  message.classList.add("show");
  message.style.opacity = 1;

  startConfetti();

  setTimeout(() => {

    clearInterval(confettiInterval);
    confettiInterval = null;

  }, 8000);
}

function startConfetti() {

  if(confettiInterval) return;

  confettiInterval = setInterval(() => {

    for(let i = 0; i < 8; i++) {

      const confetti = document.createElement("div");

      confetti.className = "confetti";

      confetti.style.left =
        Math.random() * 100 + "vw";

      confetti.style.backgroundColor =
        `hsl(${Math.random()*360},100%,50%)`;

      confetti.style.animationDuration =
        Math.random() * 2 + 2 + "s";

      document.body.appendChild(confetti);

      setTimeout(() => confetti.remove(), 4000);
    }

  }, 700);
}

</script>

</body>
</html>
